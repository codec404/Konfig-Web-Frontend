name: Trigger Production Deploy

on:
  release:
    types: [published]

jobs:
  dispatch:
    name: Notify Konfig repo to deploy
    runs-on: ubuntu-latest

    steps:
      - name: Send repository_dispatch to Konfig
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.KONFIG_DISPATCH_TOKEN }}
          repository: ${{ secrets.KONFIG_REPO }}   # e.g. "your-github-username/Konfig"
          event-type: deploy
          client-payload: |
            {
              "repo": "Konfig-Web-Frontend",
              "tag": "${{ github.event.release.tag_name }}",
              "url": "${{ github.event.release.html_url }}"
            }
